name: docker

permissions:
  contents: read

on:
  pull_request: &ignore-paths
    paths-ignore:
      - ".bowerrc"
      - ".editorconfig"
      - ".git-blame-ignore-revs"
      - ".gitattributes"
      - ".github/CONTRIBUTING.md"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE.md"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/SECURITY.md"
      - ".gitignore"
      - "LICENSE.md"
      - "README.md"
      - "requirements.php"
      - "Vagrantfile"

  push: *ignore-paths

jobs:
  apache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout.
        uses: actions/checkout@v6

      - name: Build and start containers.
        run: docker compose up -d --build --wait

      - name: Initialize application.
        run: docker compose exec -T frontend php /app/init --env=Development --overwrite=All

      - name: Wait for dependencies update.
        run: sleep 15

      - name: Frontend health check.
        run: curl -sSf http://127.0.0.1:20080 > /dev/null

      - name: Backend health check.
        run: curl -sSf -o /dev/null -w "%{http_code}" http://127.0.0.1:21080 | grep -q "302\|200"

      - name: Codeception build.
        run: docker compose exec -T frontend vendor/bin/codecept build

      - name: Codeception run.
        run: docker compose exec -T frontend vendor/bin/codecept run
